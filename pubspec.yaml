name: cos_buddy
description: "코스프레의 모든 것. 코스버디."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.5.1

  # 라우터
  go_router: ^14.0.0

  # 네트워크
  dio: ^5.7.0

  # 로컬 저장소
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.0

  # 이미지
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  photo_view: ^0.15.0

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_messaging: ^16.1.2

  # 인증
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1

  # 광고
  google_mobile_ads: ^7.0.0

  # 인앱구매
  in_app_purchase: ^3.2.0

  # 실시간 채팅
  web_socket_channel: ^3.0.3

  # 동영상 / 숏폼
  video_player: ^2.10.0
  visibility_detector: ^0.4.0+2

  # 프리미엄 기능
  pip: ^0.0.2
  live_activities: ^2.4.7

  # 유틸
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.20.2
  crypto: ^3.0.3

  # 앱 버전 확인
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

  # 로컬 알림
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.4.1               # freezed_annotation ^2.4.1과 메이저 통일
  json_serializable: ^6.8.0     # source_gen 충돌 없는 안정 버전